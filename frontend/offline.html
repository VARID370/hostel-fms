<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Offline — HostelEats</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;color:#f0f2f8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .icon{font-size:64px;margin-bottom:24px}
    h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:12px}
    p{color:#8b91a8;font-size:14px;max-width:320px;line-height:1.6;margin:0 auto 28px}
    button{padding:14px 28px;background:#FF6B35;color:white;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
    button:hover{background:#e55a24}
  </style>
</head>
<body>
  <div>
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>HostelEats needs an internet connection to load menus and bookings. Your saved QR passes may still be available in cache.</p>
    <button onclick="window.location.reload()">🔄 Try Again</button>
  </div>
</body>
</html>
